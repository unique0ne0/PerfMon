<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  background:transparent;
  overflow:hidden;
  font-family:'Segoe UI','Malgun Gothic',sans-serif;
  user-select:none;
  cursor:default;
}

#root {
  width:100%; height:100%;
  display:flex;
  flex-direction:column;
  gap:0;
  background:rgba(8,10,16,0.85);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:5px;
  overflow:hidden;
  /* 드래그 핸들 (전체 창) */
  -webkit-app-region:drag;
}

.panel {
  flex:1;
  display:flex;
  flex-direction:column;
  padding:3px 4px 2px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  min-height:0;
}
.panel:last-child { border-bottom:none; }

.hdr {
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  margin-bottom:2px;
  flex-shrink:0;
}

.lbl {
  font-size:8px;
  font-weight:600;
  letter-spacing:0.06em;
  text-transform:uppercase;
}

.vals {
  display:flex;
  gap:5px;
  align-items:baseline;
}

.v1, .v2 {
  font-size:8px;
  font-variant-numeric:tabular-nums;
  font-weight:700;
}

.v2 { opacity:0.65; }

canvas {
  display:block;
  width:100%;
  flex:1;
  min-height:0;
  border-radius:2px;
  -webkit-app-region:no-drag;
  cursor:crosshair;
}

/* 우클릭 메뉴 */
#ctx {
  display:none;
  position:fixed;
  z-index:999;
  background:rgba(12,14,20,0.98);
  border:1px solid rgba(255,255,255,0.13);
  border-radius:6px;
  padding:4px 0;
  min-width:150px;
  font-size:10px;
  -webkit-app-region:no-drag;
  box-shadow:0 4px 16px rgba(0,0,0,0.6);
}
#ctx.show { display:block; }

.ch  { padding:3px 11px; color:rgba(255,255,255,0.22); font-size:9px; }
.ci  { padding:5px 11px; color:rgba(255,255,255,0.75); cursor:pointer; display:flex; align-items:center; gap:7px; }
.ci:hover { background:rgba(255,255,255,0.07); color:#fff; }
.cs  { height:1px; background:rgba(255,255,255,0.07); margin:3px 0; }

.slider-wrap {
  padding:3px 11px 6px;
  -webkit-app-region:no-drag;
}
.slider-wrap label { display:flex; justify-content:space-between; color:rgba(255,255,255,0.4); font-size:9px; margin-bottom:3px; }
input[type=range] {
  width:100%; accent-color:#00c3ff; cursor:pointer;
  -webkit-app-region:no-drag;
}

.dot {
  width:6px; height:6px; border-radius:50%; flex-shrink:0;
}
</style>
</head>
<body>
<div id="root" oncontextmenu="showCtx(event)">

  <!-- CPU -->
  <div class="panel" id="pCpu">
    <div class="hdr">
      <span class="lbl" style="color:#00c3ff">CPU</span>
      <div class="vals">
        <span class="v1" id="vCpu" style="color:#00c3ff">0%</span>
        <span class="v2" id="vTemp" style="color:#00c3ff"></span>
      </div>
    </div>
    <canvas id="gCpu"></canvas>
  </div>

  <!-- MEM -->
  <div class="panel" id="pMem">
    <div class="hdr">
      <span class="lbl" style="color:#a855f7">Mem</span>
      <div class="vals">
        <span class="v1" id="vMem" style="color:#a855f7">0%</span>
        <span class="v2" id="vMemGB" style="color:#a855f7"></span>
      </div>
    </div>
    <canvas id="gMem"></canvas>
  </div>

  <!-- DISK (R + W 두 라인) -->
  <div class="panel" id="pDisk">
    <div class="hdr">
      <span class="lbl" style="color:#f97316">Disk</span>
      <div class="vals">
        <span class="dot" style="background:#f97316"></span>
        <span class="v1" id="vDR" style="color:#f97316">0</span>
        <span class="dot" style="background:#fb923c;opacity:0.55"></span>
        <span class="v2" id="vDW" style="color:#fb923c">0</span>
      </div>
    </div>
    <canvas id="gDisk"></canvas>
  </div>

  <!-- NET (Down + Up 두 라인) -->
  <div class="panel" id="pNet">
    <div class="hdr">
      <span class="lbl" style="color:#22c55e">Net</span>
      <div class="vals">
        <span class="dot" style="background:#22c55e"></span>
        <span class="v1" id="vNDn" style="color:#22c55e">0</span>
        <span class="dot" style="background:#4ade80;opacity:0.55"></span>
        <span class="v2" id="vNUp" style="color:#4ade80">0</span>
      </div>
    </div>
    <canvas id="gNet"></canvas>
  </div>

</div>

<!-- 컨텍스트 메뉴 -->
<div id="ctx">
  <div class="ch">배경 투명도</div>
  <div class="slider-wrap">
    <label><span>투명도</span><span id="opLbl">85%</span></label>
    <input type="range" id="opSlider" min="10" max="100" value="85">
  </div>
  <div class="cs"></div>
  <div class="ch">표시 옵션</div>
  <div class="ci" id="aotBtn" onclick="toggleAot()">
    <span id="aotIcon">✓</span> 항상 위 표시
  </div>
  <div class="cs"></div>
  <div class="ch">패널</div>
  <div class="ci" onclick="togglePanel('pCpu','cpu')">CPU 패널</div>
  <div class="ci" onclick="togglePanel('pMem','mem')">메모리 패널</div>
  <div class="ci" onclick="togglePanel('pDisk','disk')">디스크 패널</div>
  <div class="ci" onclick="togglePanel('pNet','net')">네트워크 패널</div>
  <div class="cs"></div>
  <div class="ci" onclick="hideCtx()">닫기</div>
</div>

<script>
'use strict';

const HIST = 80;

// 각 채널 버퍼 (단일값 or [v1, v2] 쌍)
const bufs = {
  cpu:  Array(HIST).fill(0),
  mem:  Array(HIST).fill(0),
  diskR: Array(HIST).fill(0),
  diskW: Array(HIST).fill(0),
  netDn: Array(HIST).fill(0),
  netUp: Array(HIST).fill(0)
};

function push(key, v) {
  bufs[key].push(Math.max(0, Math.min(100, v)));
  if (bufs[key].length > HIST) bufs[key].shift();
}

// ─── 캔버스 그리기 ───────────────────────────────────────────────────
// 단일 라인
function drawSingle(canvasId, buf, color) {
  const c = document.getElementById(canvasId);
  if (!c) return;
  const r = c.getBoundingClientRect();
  const W = Math.round(r.width * devicePixelRatio);
  const H = Math.round(r.height * devicePixelRatio);
  if (!W || !H) return;
  if (c.width !== W || c.height !== H) { c.width = W; c.height = H; }
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  drawGrid(ctx, W, H);

  const pts = buf.map((v, i) => ({
    x: (i / (HIST - 1)) * W,
    y: H - (v / 100) * H
  }));
  fillLine(ctx, pts, color, W, H);
}

// 두 라인 (v1=밝음, v2=흐림)
function drawDual(canvasId, buf1, buf2, color1, color2, max1, max2) {
  const c = document.getElementById(canvasId);
  if (!c) return;
  const r = c.getBoundingClientRect();
  const W = Math.round(r.width * devicePixelRatio);
  const H = Math.round(r.height * devicePixelRatio);
  if (!W || !H) return;
  if (c.width !== W || c.height !== H) { c.width = W; c.height = H; }
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  drawGrid(ctx, W, H);

  const norm = (buf, mx) => buf.map((v, i) => ({
    x: (i / (HIST - 1)) * W,
    y: H - (Math.min(v, mx) / mx) * H
  }));

  // 두 라인 각자의 동적 최댓값 기준
  const mx = Math.max(max1, 1);
  const pts1 = norm(buf1, mx);
  const pts2 = norm(buf2, mx);

  // 뒤쪽(write/up)부터 그려서 앞쪽(read/dn)이 위로
  fillLine(ctx, pts2, color2, W, H, 0.45);
  fillLine(ctx, pts1, color1, W, H, 0.75);
}

function drawGrid(ctx, W, H) {
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = Math.max(0.5, devicePixelRatio * 0.5);
  [0.25, 0.5, 0.75].forEach(r => {
    const y = Math.round(H * r);
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  });
}

function fillLine(ctx, pts, color, W, H, alpha = 0.8) {
  if (pts.length < 2) return;

  // Fill
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, color + Math.round(alpha * 0.55 * 255).toString(16).padStart(2,'0'));
  g.addColorStop(1, color + '00');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, H);
  pts.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.lineTo(pts[pts.length - 1].x, H);
  ctx.closePath();
  ctx.fill();

  // Line
  ctx.strokeStyle = color + Math.round(alpha * 255).toString(16).padStart(2,'0');
  ctx.lineWidth = Math.max(1, devicePixelRatio * 1.1);
  ctx.lineJoin = 'round';
  ctx.beginPath();
  pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.stroke();
}

// ─── 단위 포맷 ────────────────────────────────────────────────────────
function fmtMB(v) {
  const n = parseFloat(v);
  if (n >= 1000) return (n/1024).toFixed(1)+'G';
  if (n >= 100)  return n.toFixed(0)+'M';
  if (n >= 1)    return n.toFixed(1)+'M';
  return (n*1024).toFixed(0)+'K';
}
function fmtKB(v) {
  const n = parseFloat(v);
  if (n >= 1024) return (n/1024).toFixed(1)+'M';
  return n+'K';
}

// 동적 최댓값 (버퍼 최댓값 × 1.2, 최소 1)
function dynMax(buf) { return Math.max(1, Math.max(...buf) * 1.2); }

// ─── 전체 리드로우 ────────────────────────────────────────────────────
function redraw() {
  drawSingle('gCpu', bufs.cpu, '#00c3ff');
  drawSingle('gMem', bufs.mem, '#a855f7');

  const dMax = dynMax([...bufs.diskR, ...bufs.diskW]);
  drawDual('gDisk', bufs.diskR, bufs.diskW, '#f97316', '#fb923c', dMax, dMax);

  const nMax = dynMax([...bufs.netDn, ...bufs.netUp]);
  drawDual('gNet',  bufs.netDn, bufs.netUp, '#22c55e', '#4ade80', nMax, nMax);
}

// ─── 데이터 수신 ──────────────────────────────────────────────────────
if (window.perfAPI) {
  // 저장된 설정 복원
  const cfg = window.perfAPI.getSettings();
  if (cfg.opacity) applyBg(cfg.opacity);

  window.perfAPI.onData(d => {
    push('cpu', d.cpu);
    push('mem', d.memPct);

    // 디스크: MB/s 그대로 (동적 스케일)
    const dr = parseFloat(d.diskR) || 0;
    const dw = parseFloat(d.diskW) || 0;
    bufs.diskR.push(dr); if (bufs.diskR.length > HIST) bufs.diskR.shift();
    bufs.diskW.push(dw); if (bufs.diskW.length > HIST) bufs.diskW.shift();

    // 네트워크: KB/s
    bufs.netDn.push(d.netDn); if (bufs.netDn.length > HIST) bufs.netDn.shift();
    bufs.netUp.push(d.netUp); if (bufs.netUp.length > HIST) bufs.netUp.shift();

    // 레이블 업데이트
    document.getElementById('vCpu').textContent  = d.cpu + '%';
    document.getElementById('vTemp').textContent = d.temp ? d.temp+'°' : '';
    document.getElementById('vMem').textContent  = d.memPct + '%';
    document.getElementById('vMemGB').textContent = d.memUsed + 'G';
    document.getElementById('vDR').textContent   = fmtMB(d.diskR);
    document.getElementById('vDW').textContent   = fmtMB(d.diskW);
    document.getElementById('vNDn').textContent  = fmtKB(d.netDn);
    document.getElementById('vNUp').textContent  = fmtKB(d.netUp);

    redraw();
  });

} else {
  // ─── 브라우저 시뮬레이션 ─────────────────────────────────────────
  const sim = { cpu:30, mem:55, dr:5, dw:2, dn:200, up:50 };
  setInterval(() => {
    sim.cpu = clamp(sim.cpu + rnd(12), 1,  99);
    sim.mem = clamp(sim.mem + rnd(2),  30, 95);
    sim.dr  = clamp(sim.dr  + rnd(8),  0, 200);
    sim.dw  = clamp(sim.dw  + rnd(5),  0, 100);
    sim.dn  = clamp(sim.dn  + rnd(150),0,2000);
    sim.up  = clamp(sim.up  + rnd(50), 0,500);

    push('cpu', sim.cpu);
    push('mem', sim.mem);
    bufs.diskR.push(sim.dr); if(bufs.diskR.length>HIST) bufs.diskR.shift();
    bufs.diskW.push(sim.dw); if(bufs.diskW.length>HIST) bufs.diskW.shift();
    bufs.netDn.push(sim.dn); if(bufs.netDn.length>HIST) bufs.netDn.shift();
    bufs.netUp.push(sim.up); if(bufs.netUp.length>HIST) bufs.netUp.shift();

    document.getElementById('vCpu').textContent = Math.round(sim.cpu)+'%';
    document.getElementById('vMem').textContent = Math.round(sim.mem)+'%';
    document.getElementById('vMemGB').textContent = (sim.mem/100*16).toFixed(1)+'G';
    document.getElementById('vDR').textContent  = fmtMB(sim.dr.toFixed(1));
    document.getElementById('vDW').textContent  = fmtMB(sim.dw.toFixed(1));
    document.getElementById('vNDn').textContent = fmtKB(Math.round(sim.dn));
    document.getElementById('vNUp').textContent = fmtKB(Math.round(sim.up));
    redraw();
  }, 700);
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function rnd(r) { return (Math.random()-0.48)*r; }

// ─── 투명도 슬라이더 ─────────────────────────────────────────────────
function applyBg(v) {
  document.getElementById('root').style.background = `rgba(8,10,16,${v/100})`;
  document.getElementById('opSlider').value = v;
  document.getElementById('opLbl').textContent = v + '%';
  if (window.perfAPI) window.perfAPI.setOpacity(v / 100);
}

document.getElementById('opSlider').addEventListener('input', function() {
  applyBg(parseInt(this.value));
});

// ─── 항상 위 토글 ────────────────────────────────────────────────────
let aot = true;
function toggleAot() {
  aot = !aot;
  document.getElementById('aotIcon').textContent = aot ? '✓' : '✗';
  if (window.perfAPI) window.perfAPI.setAot(aot);
  hideCtx();
}

// ─── 패널 토글 ───────────────────────────────────────────────────────
function togglePanel(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.display = el.style.display === 'none' ? '' : 'none';
  hideCtx();
}

// ─── 컨텍스트 메뉴 ───────────────────────────────────────────────────
const ctxEl = document.getElementById('ctx');
function showCtx(e) {
  e.preventDefault();
  const x = Math.min(e.clientX, window.innerWidth  - 160);
  const y = Math.min(e.clientY, window.innerHeight - 220);
  ctxEl.style.left = x + 'px';
  ctxEl.style.top  = y + 'px';
  ctxEl.classList.add('show');
}
function hideCtx() { ctxEl.classList.remove('show'); }
document.addEventListener('click', hideCtx);

// ─── 리사이즈 대응 ───────────────────────────────────────────────────
const ro = new ResizeObserver(() => redraw());
ro.observe(document.getElementById('root'));
</script>
</body>
</html>
